name: Download Price History

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-prices:
    name: Download FX Prices from FRED
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download FX price series from FRED
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python training/build_labels.py

      - name: Verify output
        run: |
          if [ ! -f "training/data/prices_2006_2026.csv" ]; then
            echo "ERROR: prices_2006_2026.csv was not created"
            exit 1
          fi
          echo "Rows: $(wc -l < training/data/prices_2006_2026.csv)"
          head -2 training/data/prices_2006_2026.csv

      - name: Commit prices CSV
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add training/data/prices_2006_2026.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "training: add FX price history 2006-$(date +%Y) [B2-01e]"
            git push
          fi
